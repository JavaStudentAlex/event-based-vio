name: 3. Auto Merge Jules PR

on:
  workflow_run:
    workflows: ["ci-lint", "ci-tests", "ci-structure", "ci-slow-lane"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr:
        description: "Pull request number to merge if it is a Jules PR and CI has passed"
        required: true
        type: string

permissions:
  actions: read
  checks: read
  contents: write
  pull-requests: write
  statuses: read

concurrency:
  group: jules-auto-merge-${{ github.event.workflow_run.head_branch || inputs.pr || github.run_id }}
  cancel-in-progress: false

jobs:
  merge:
    name: Merge Jules PR after CI success
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.event == 'pull_request' &&
          github.event.workflow_run.conclusion == 'success'
        )
      }}

    env:
      GH_TOKEN: ${{ github.token }}
      JULES_AUTO_MERGE_ACTORS: ${{ vars.JULES_AUTO_MERGE_ACTORS }}
      JULES_AUTO_MERGE_BRANCH_PREFIXES: ${{ vars.JULES_AUTO_MERGE_BRANCH_PREFIXES }}
      JULES_REQUIRED_CHECKS: ${{ vars.JULES_REQUIRED_CHECKS }}

    steps:
      - name: Resolve pull request
        id: pr
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr }}"
          else
            PR_NUMBER="$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")"

            if [ -z "${PR_NUMBER}" ]; then
              HEAD_SHA="$(jq -r '.workflow_run.head_sha' "$GITHUB_EVENT_PATH")"
              PR_NUMBER="$(gh api \
                -H "Accept: application/vnd.github+json" \
                "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/pulls" \
                --jq '.[0].number // empty')"
            fi
          fi

          if [ -z "${PR_NUMBER}" ]; then
            echo "No pull request associated with this CI run."
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_pr=true" >> "$GITHUB_OUTPUT"
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Check Jules eligibility
        if: steps.pr.outputs.has_pr == 'true'
        id: eligibility
        run: |
          set -euo pipefail

          PR_NUMBER="${{ steps.pr.outputs.number }}"
          gh pr view "${PR_NUMBER}" \
            --json number,title,body,author,headRefName,headRefOid,isDraft,state,labels,url \
            > /tmp/pr.json

          python3 - <<'PY' > /tmp/eligibility.env
          import json
          import os
          from pathlib import Path

          pr = json.loads(Path("/tmp/pr.json").read_text(encoding="utf-8"))

          default_actors = "google-labs-jules[bot],jules[bot]"
          default_prefixes = "jules/,jules-"

          actors = {
              item.strip()
              for item in (os.environ.get("JULES_AUTO_MERGE_ACTORS") or default_actors).split(",")
              if item.strip()
          }
          prefixes = [
              item.strip()
              for item in (os.environ.get("JULES_AUTO_MERGE_BRANCH_PREFIXES") or default_prefixes).split(",")
              if item.strip()
          ]

          labels = {label["name"] for label in pr.get("labels", [])}
          author = (pr.get("author") or {}).get("login", "")
          head_ref = pr.get("headRefName") or ""

          is_jules = (
              "jules-auto-merge" in labels
              or author in actors
              or any(head_ref.startswith(prefix) for prefix in prefixes)
          )

          print(f"PR_NUMBER={pr['number']}")
          print(f"PR_URL={pr['url']}")
          print(f"PR_STATE={pr['state']}")
          print(f"PR_DRAFT={'true' if pr['isDraft'] else 'false'}")
          print(f"IS_JULES={'true' if is_jules else 'false'}")
          print(f"AUTHOR={author}")
          print(f"HEAD_REF={head_ref}")
          print(f"HEAD_SHA={pr['headRefOid']}")
          PY

          cat /tmp/eligibility.env
          cat /tmp/eligibility.env >> "$GITHUB_OUTPUT"

      - name: Validate queue update
        if: >-
          ${{
            steps.pr.outputs.has_pr == 'true' &&
            steps.eligibility.outputs.IS_JULES == 'true' &&
            steps.eligibility.outputs.PR_STATE == 'OPEN' &&
            steps.eligibility.outputs.PR_DRAFT == 'false'
          }}
        run: |
          set -euo pipefail

          PR_NUMBER="${{ steps.pr.outputs.number }}"
          if ! gh pr diff "${PR_NUMBER}" --name-only | grep -q '^\.gsd/'; then
            echo "::error::Jules PRs must update relevant .gsd task-state files before auto-merge."
            exit 1
          fi

      - name: Wait for lint, tests, and PR checks
        if: >-
          ${{
            steps.pr.outputs.has_pr == 'true' &&
            steps.eligibility.outputs.IS_JULES == 'true' &&
            steps.eligibility.outputs.PR_STATE == 'OPEN' &&
            steps.eligibility.outputs.PR_DRAFT == 'false'
          }}
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail

          REQUIRED_CHECKS="${JULES_REQUIRED_CHECKS:-Lint,Tests,Six-pack quality slow lane,PR description filled in,Large PR requires justification}"
          export REQUIRED_CHECKS

          for attempt in $(seq 1 30); do
            gh pr checks "${PR_NUMBER}" --json name,state,conclusion,bucket > /tmp/pr-checks.json || true

            set +e
            python3 - <<'PY'
          import json
          import os
          import sys
          from collections import defaultdict
          from pathlib import Path

          checks = json.loads(Path("/tmp/pr-checks.json").read_text(encoding="utf-8") or "[]")
          required = [
              item.strip()
              for item in os.environ["REQUIRED_CHECKS"].split(",")
              if item.strip()
          ]

          by_name = defaultdict(list)
          for check in checks:
              by_name[check.get("name", "")].append(check)

          missing = []
          pending = []
          failed = []

          for name in required:
              matching = by_name.get(name, [])
              if not matching:
                  missing.append(name)
                  continue

              passing = False
              name_pending = False
              name_failed = False

              for check in matching:
                  state = str(check.get("state") or "").lower()
                  conclusion = str(check.get("conclusion") or "").lower()
                  bucket = str(check.get("bucket") or "").lower()

                  if bucket in {"pass", "skipping"} or conclusion in {"success", "neutral", "skipped"}:
                      passing = True
                  elif bucket == "pending" or state not in {"completed", "success"}:
                      name_pending = True
                  else:
                      name_failed = True

              if passing:
                  continue
              if name_pending:
                  pending.append(name)
              elif name_failed:
                  failed.append(name)
              else:
                  pending.append(name)

          if failed:
              print(f"Required checks failed: {', '.join(failed)}")
              sys.exit(1)
          if missing or pending:
              if missing:
                  print(f"Required checks missing: {', '.join(missing)}")
              if pending:
                  print(f"Required checks pending: {', '.join(pending)}")
              sys.exit(2)

          print(f"Required checks passed: {', '.join(required)}")
          PY
            status=$?
            set -e

            if [ "$status" -eq 0 ]; then
              exit 0
            fi

            if [ "$status" -eq 2 ]; then
              echo "Waiting for required checks to finish (attempt ${attempt}/30)."
              sleep 20
              continue
            fi

            exit "$status"
          done

          echo "::error::Timed out waiting for required checks."
          exit 1

      - name: Merge PR
        if: >-
          ${{
            steps.pr.outputs.has_pr == 'true' &&
            steps.eligibility.outputs.IS_JULES == 'true' &&
            steps.eligibility.outputs.PR_STATE == 'OPEN' &&
            steps.eligibility.outputs.PR_DRAFT == 'false'
          }}
        run: |
          set -euo pipefail

          PR_NUMBER="${{ steps.pr.outputs.number }}"
          echo "Merging Jules PR #${PR_NUMBER} after successful checks."
          gh pr merge "${PR_NUMBER}" --squash --delete-branch

      - name: Report skipped PR
        if: >-
          ${{
            steps.pr.outputs.has_pr == 'true' &&
            (
              steps.eligibility.outputs.IS_JULES != 'true' ||
              steps.eligibility.outputs.PR_STATE != 'OPEN' ||
              steps.eligibility.outputs.PR_DRAFT == 'true'
            )
          }}
        run: |
          cat <<'EOF'
          Auto-merge skipped.
          IS_JULES=${{ steps.eligibility.outputs.IS_JULES }}
          PR_STATE=${{ steps.eligibility.outputs.PR_STATE }}
          PR_DRAFT=${{ steps.eligibility.outputs.PR_DRAFT }}
          AUTHOR=${{ steps.eligibility.outputs.AUTHOR }}
          HEAD_REF=${{ steps.eligibility.outputs.HEAD_REF }}
          EOF
