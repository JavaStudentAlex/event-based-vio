name: ci-tests

on:
  pull_request:
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  pytest:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: |
          set -euo pipefail

          if [ ! -d tests ]; then
            echo "No tests directory found; skipping pytest until application tests exist."
            exit 0
          fi

          uv run pytest tests -vv --tb=long --showlocals
